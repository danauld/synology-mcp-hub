# docker-compose.yml — Portainer stack file for the Synology MCP Hub.
#
# Deploy this stack on Balmoral via Portainer. Replaces the standalone
# `arr-mcp` + `dispatcharr-mcp` Synology stacks and the Cloud Run
# `grampsweb-mcp` service.
#
# Networks:
#   - mcp-hub-net (internal): the Cloudflare Tunnel container joins this
#     so it can reach mcp-hub by service name.
#   - sonarr_default, dispatcharr_default, grampsweb_default (external):
#     pre-existing networks created by the respective backend stacks.
#     Joining them lets the Hub reach LAN backends by Docker DNS:
#     http://sonarr:8989, http://dispatcharr:9191, http://grampsweb:5000
#     etc., with zero tunnel hops.
#
# Auth model B (per the approved plan):
#   - This Hub container has NO OAuth. It trusts incoming requests because
#     the Cloudflare Tunnel routes them through a self-hosted CF Access
#     app with a Service-Token-only policy. Only the per-MCP Worker shims
#     hold the Service Token; only they can reach this container.
#
# Env files: each per-MCP env file is mounted from /volume1/docker/synology-mcp-hub/env/
# on the Synology host (matches the existing dispatcharr-mcp pattern).

services:
  mcp-hub:
    image: ghcr.io/danauld/synology-mcp-hub:latest
    container_name: mcp-hub
    restart: unless-stopped
    pull_policy: always

    env_file:
      - /volume1/docker/synology-mcp-hub/env/arr.env
      - /volume1/docker/synology-mcp-hub/env/dispatcharr.env
      - /volume1/docker/synology-mcp-hub/env/gramps.env
      - /volume1/docker/synology-mcp-hub/env/trakt.env

    # Trakt's per-user OAuth token persists to disk inside the container.
    # Bind-mount a host directory so the device-code dance survives
    # container restarts / image upgrades.
    volumes:
      - /volume1/docker/synology-mcp-hub/state/trakt:/state/trakt

    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

    # Publish each MCP's port to the Synology host so the existing
    # synology-dommus cloudflared tunnel (which routes via 192.168.4.79:<port>)
    # can reach them. The Synology firewall blocks external access — only
    # the local tunnel container hits these ports.
    ports:
      - "8120:8120"  # arr
      - "8121:8121"  # dispatcharr
      - "8122:8122"  # gramps
      - "8123:8123"  # trakt
      - "8124:8124"  # openfoodfacts
      - "8125:8125"  # pbs

    networks:
      mcp-hub-net:
      # Join only the backend networks we actually use Docker DNS for.
      # arr-mcp uses HOST IP (192.168.4.79:8989/7878/9696) for sonarr/radarr/
      # prowlarr — no network join needed for those.
      dispatcharr_default: {}
      grampsweb_default: {}

    labels:
      com.centurylinklabs.watchtower.enable: "true"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # The Cloudflare Tunnel container is shared (synology-dommus). We do NOT
  # define it here — the existing tunnel stack on Balmoral handles it. We
  # just need to update its ingress rules to route the three -be hostnames
  # to mcp-hub:81NN. That's done via the CF API, not docker-compose.
  #
  # If/when the synology-dommus tunnel becomes part of this stack, add a
  # cloudflared service here and merge the routing.

networks:
  mcp-hub-net:
    name: mcp-hub-net
    driver: bridge

  dispatcharr_default:
    external: true
    name: dispatcharr_default

  grampsweb_default:
    external: true
    name: grampsweb_default
